<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamantes Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#1e3a8a,#020617 65%);
  font-family:Arial,sans-serif;
  color:white;
  overflow:hidden;
}

.particles span{
  position:absolute;
  width:8px;
  height:8px;
  background:#38bdf8;
  border-radius:50%;
  box-shadow:0 0 20px #38bdf8;
  animation:float 8s infinite linear;
}

@keyframes float{
  from{transform:translateY(110vh) scale(.3);opacity:0}
  30%{opacity:1}
  to{transform:translateY(-20vh) scale(1);opacity:0}
}

.card{
  position:relative;
  z-index:2;
  max-width:420px;
  margin:80px auto;
  padding:35px 28px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 45px rgba(56,189,248,.35);
  text-align:center;
  animation:enter 1s ease;
}

@keyframes enter{
  from{opacity:0;transform:translateY(40px) scale(.9)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.diamond{
  font-size:70px;
  margin-bottom:10px;
  animation:pulse 1.5s infinite;
  filter:drop-shadow(0 0 18px #38bdf8);
}

@keyframes pulse{
  0%,100%{transform:scale(1) rotate(0)}
  50%{transform:scale(1.14) rotate(6deg)}
}

h1{
  font-size:31px;
  margin-bottom:12px;
  text-shadow:0 0 18px #38bdf8;
}

p{
  color:#dbeafe;
  font-size:17px;
  line-height:1.5;
  margin-bottom:25px;
}

.features{
  display:grid;
  gap:12px;
  margin-bottom:25px;
}

.feature{
  background:rgba(255,255,255,.09);
  padding:12px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,.12);
}

.btn{
  display:inline-block;
  width:100%;
  padding:17px;
  border-radius:18px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 25px rgba(34,197,94,.65);
  position:relative;
  overflow:hidden;
  transition:.25s;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  transition:.5s;
}

.btn:hover,
.btn:active{
  transform:scale(1.06);
  box-shadow:0 0 40px rgba(34,197,94,.9);
}

.btn:hover::before,
.btn:active::before{
  left:100%;
}

.footer{
  margin-top:18px;
  font-size:13px;
  color:#bfdbfe;
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="card">
  <div class="diamond">💎</div>

  <h1>Compre Diamantes Comigo</h1>

  <p>
    Atendimento rápido, seguro e direto pelo WhatsApp.
    Chame agora e consulte valores disponíveis.
  </p>

  <div class="features">
    <div class="feature">⚡ Atendimento rápido</div>
    <div class="feature">💬 Compra direta pelo WhatsApp</div>
    <div class="feature">🔒 Suporte durante o pedido</div>
  </div>

  <a class="btn" href="https://wa.me/5566999568293?text=Olá!%20Quero%20comprar%20diamantes." target="_blank">
    Comprar pelo WhatsApp
  </a>

  <div class="footer">Toque no botão para iniciar o atendimento</div>
</div>

<script>
const particles = document.querySelector(".particles");

for(let i=0;i<35;i++){
  const s = document.createElement("span");
  s.style.left = Math.random()*100 + "vw";
  s.style.animationDelay = Math.random()*8 + "s";
  s.style.animationDuration = 5 + Math.random()*6 + "s";
  particles.appendChild(s);
}

const btn = document.querySelector(".btn");

btn.addEventListener("click", () => {
  btn.innerText = "Abrindo WhatsApp...";
  btn.style.transform = "scale(.94)";
});
</script>

</body>
</html>
